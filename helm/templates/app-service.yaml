apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vegetable-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.vegetable.appLabel }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  type: {{ .Values.service.type }}
